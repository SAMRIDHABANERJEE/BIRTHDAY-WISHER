<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Wisher 🎉</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
    font-family:Georgia,serif;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background:linear-gradient(135deg,#667eea,#764ba2);
    padding:20px;
}
.start-screen{
    background:white;
    padding:40px;
    border-radius:25px;
    text-align:center;
    box-shadow:0 20px 60px rgba(0,0,0,0.3);
    width:100%;
    max-width:400px;
}
.start-screen input{
    width:100%;
    padding:12px;
    margin-top:15px;
    border-radius:30px;
    border:1px solid #ccc;
    font-size:16px;
}
.start-screen button{
    margin-top:20px;
    padding:12px 30px;
    border:none;
    border-radius:30px;
    background:#667eea;
    color:white;
    font-size:18px;
    cursor:pointer;
}
.birthday-card{
    display:none;
    background:linear-gradient(135deg,#fff9ff,#f0ecff);
    padding:50px 40px;
    border-radius:30px;
    text-align:center;
    max-width:650px;
    width:100%;
    box-shadow:0 20px 60px rgba(0,0,0,0.3);
    animation:fadeIn 0.8s ease;
}
@keyframes fadeIn{
    from{opacity:0;transform:scale(0.8)}
    to{opacity:1;transform:scale(1)}
}
.photo-container{
    width:200px;
    height:200px;
    margin:0 auto 20px;
    border-radius:20px;
    overflow:hidden;
    border:6px solid #764ba2;
}
.photo-container img{
    width:100%;
    height:100%;
    object-fit:cover;
}
.age{
    font-size:70px;
    font-weight:bold;
    background:linear-gradient(135deg,#667eea,#764ba2,#f093fb);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}
.name{
    font-size:45px;
    color:#764ba2;
    margin:15px 0;
}
.message{
    font-size:20px;
    color:#555;
    margin:20px 0;
    line-height:1.6;
}
.button{
    padding:14px 35px;
    border:none;
    border-radius:40px;
    font-size:18px;
    cursor:pointer;
    margin:8px;
    background:linear-gradient(135deg,#667eea,#764ba2);
    color:white;
}
</style>
</head>
<body>

<!-- START SCREEN -->
<div class="start-screen" id="startScreen">
    <h2>🎂 Birthday Wisher</h2>
    <input type="text" id="username" placeholder="Enter Name">
    <input type="number" id="userage" placeholder="Enter Age">
    <input type="file" id="photoUpload" accept="image/*">
    <button onclick="generateWish()">Create Wish ✨</button>
</div>

<!-- BIRTHDAY CARD -->
<div class="birthday-card" id="birthdayCard">
    <div class="photo-container">
        <img id="displayPhoto" src="" alt="Birthday Photo">
    </div>
    <div class="age" id="displayAge"></div>
    <h1>Happy Birthday</h1>
    <div class="name" id="displayName"></div>
    <div class="message" id="messageText"></div>
    <button class="button" onclick="downloadCard()">Download Wish 📥</button>
    <button class="button" onclick="goBack()">New Wish 🔁</button>
</div>

<script>
function getOrdinal(n) {
    const s = ["th", "st", "nd", "rd"];
    const v = n % 100;
    return n + (s[(v - 20) % 10] || s[v] || s[0]);
}

function generateWish() {
    const name = document.getElementById("username").value.trim();
    const age = parseInt(document.getElementById("userage").value.trim());
    const photoInput = document.getElementById("photoUpload");

    if (name === "" || isNaN(age)) {
        alert("Please enter both name and age!");
        return;
    }

    const ordinal = getOrdinal(age);
    document.getElementById("displayName").innerText = name + "!";
    document.getElementById("displayAge").innerText = ordinal + " 🎉";
    document.getElementById("messageText").innerText =
        "Wishing you an incredible " + ordinal + " birthday filled with joy, laughter, and success! " +
        "May this year bring new opportunities and beautiful memories. 🎂✨";

    if (photoInput.files && photoInput.files[0]) {
        const reader = new FileReader();
        reader.onload = function(e) {
            document.getElementById("displayPhoto").src = e.target.result;
        };
        reader.readAsDataURL(photoInput.files[0]);
    } else {
        document.getElementById("displayPhoto").src =
            "https://via.placeholder.com/200x200.png?text=Happy+Birthday";
    }

    document.getElementById("startScreen").style.display = "none";
    document.getElementById("birthdayCard").style.display = "block";
}

function goBack() {
    document.getElementById("birthdayCard").style.display = "none";
    document.getElementById("startScreen").style.display = "block";
    document.getElementById("username").value = "";
    document.getElementById("userage").value = "";
    document.getElementById("photoUpload").value = "";
}

function downloadCard() {
    const card = document.getElementById("birthdayCard");
    const buttons = card.querySelectorAll(".button");

    buttons.forEach(btn => btn.style.display = "none");

    html2canvas(card, {
        scale: 3,
        useCORS: true,
        allowTaint: true,
        backgroundColor: "#f0ecff",
        logging: false
    }).then(canvas => {
        const link = document.createElement("a");
        link.download = "Birthday_Wish.png";
        link.href = canvas.toDataURL("image/png", 1.0);
        link.click();
        buttons.forEach(btn => btn.style.display = "inline-block");
    });
}
</script>

</body>
</html>
